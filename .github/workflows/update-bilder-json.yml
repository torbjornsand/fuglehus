name: Update bilder.json

on:
  push:
    paths:
      - 'bilde_*.jpg'
      - 'bilde_*.JPG'
      - 'galleri/**'
      - 'video/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Regenerate bilder.json
        run: node scripts/update-bilder-json.mjs

      - name: Commit updated manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update bilder.json'
          file_pattern: bilder.json bilder-filtrert.json galleri.json video.json
