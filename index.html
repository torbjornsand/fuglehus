<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kvitrehus 🐦</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #111;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        header {
            background: #1a1a2e;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #333;
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        header p {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .main {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .bilde-container {
            position: relative;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        .bilde-container img {
            width: 100%;
            display: block;
        }

        .bilde-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .kontroller {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        button {
            background: #2d6a4f;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        button:hover { background: #40916c; }
        button:disabled { background: #444; cursor: default; }

        .btn-capture {
            background: #c9184a;
            padding: 12px 28px;
            font-size: 1rem;
        }

        .btn-capture:hover { background: #ff4d6d; }

        #status {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            min-height: 20px;
            margin-bottom: 10px;
        }

        .teller {
            color: #888;
            font-size: 0.9rem;
        }

        .tidslinje {
            margin-top: 30px;
        }

        .tidslinje h2 {
            font-size: 1rem;
            color: #888;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tidslinje-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }

        .tidslinje-grid img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.2s;
            border: 2px solid transparent;
        }

        .tidslinje-grid img:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        .tidslinje-grid img.aktiv {
            opacity: 1;
            border-color: #40916c;
        }

        .laster {
            text-align: center;
            padding: 40px;
            color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>🐦 Kvitrehus</h1>
        <p id="header-tid">Laster...</p>
    </header>

    <div class="main">
        <div class="bilde-container">
            <img id="hovudbilde" src="" alt="Fuglehus">
            <div class="bilde-info" id="bilde-info">–</div>
        </div>

        <div style="margin-top:15px;">
            <p id="status"></p>
            <div class="kontroller">
                <button onclick="forrige()" id="btn-forrige">◀ Forrige</button>
                <span class="teller" id="teller">– / –</span>
                <button onclick="neste()" id="btn-neste">Neste ▶</button>
                <button class="btn-capture" onclick="taBilde()">📷 Ta bilde nå</button>
            </div>
        </div>

        <div class="tidslinje">
            <h2>Tidslinje</h2>
            <div class="tidslinje-grid" id="tidslinje-grid">
                <div class="laster">Laster bilder...</div>
            </div>
        </div>
    </div>

    <script>
        let bilder = [];
        let gjeldende = 0;

        async function hentBilder() {
            try {
                const resp = await fetch('https://api.github.com/repos/torbjornsand/fuglehus/contents/');
                const files = await resp.json();
                bilder = files
                    .filter(f => f.name.startsWith('bilde_') && f.name.endsWith('.jpg'))
                    .sort((a, b) => b.name.localeCompare(a.name));

                if (bilder.length > 0) {
                    visGrid();
                    visBilde(0);
                }
            } catch(e) {
                document.getElementById('status').textContent = '❌ Kunne ikke laste bilder.';
            }
        }

        function visBilde(index) {
            gjeldende = index;
            const b = bilder[index];
            document.getElementById('hovudbilde').src = b.download_url;
            const tid = b.name.replace('bilde_', '').replace('.jpg', '').replace(/_/g, ' ');
            document.getElementById('bilde-info').textContent = '📅 ' + tid;
            document.getElementById('header-tid').textContent = tid;
            document.getElementById('teller').textContent = `${index + 1} / ${bilder.length}`;
            document.getElementById('btn-forrige').disabled = index >= bilder.length - 1;
            document.getElementById('btn-neste').disabled = index <= 0;

            // Oppdater aktiv i grid
            document.querySelectorAll('.tidslinje-grid img').forEach((img, i) => {
                img.classList.toggle('aktiv', i === index);
            });
        }

        function visGrid() {
            const grid = document.getElementById('tidslinje-grid');
            grid.innerHTML = '';
            bilder.forEach((b, i) => {
                const img = document.createElement('img');
                img.src = b.download_url;
                img.title = b.name.replace('bilde_', '').replace('.jpg', '').replace(/_/g, ' ');
                img.onclick = () => visBilde(i);
                if (i === 0) img.classList.add('aktiv');
                grid.appendChild(img);
            });
        }

        function forrige() {
            if (gjeldende < bilder.length - 1) visBilde(gjeldende + 1);
        }

        function neste() {
            if (gjeldende > 0) visBilde(gjeldende - 1);
        }

        async function taBilde() {
            document.getElementById('status').textContent = '📷 Tar bilde...';
            try {
                const resp = await fetch('https://fuglehus.torbjs.workers.dev', { method: 'POST' });
                const data = await resp.json();
                if (data.success) {
                    document.getElementById('status').textContent = '✅ Bilde tatt! Oppdaterer om 35 sek...';
                    setTimeout(() => { hentBilder(); }, 35000);
                } else {
                    document.getElementById('status').textContent = '❌ ' + data.error;
                }
            } catch(e) {
                document.getElementById('status').textContent = '❌ Kunne ikke nå Pi.';
            }
        }

        hentBilder();
        setInterval(hentBilder, 600000);
    </script>
</body>
</html>
