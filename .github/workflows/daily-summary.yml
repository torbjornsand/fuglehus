name: Daily AI Summary

on:
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Dato i format YYYY-MM-DD'
        required: false

permissions:
  contents: write

jobs:
  daily-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build daily summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/daily-summary.mjs --date=${{ github.event.inputs.date }}
          else
            node scripts/daily-summary.mjs
          fi

      - name: Commit generated summary
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update daily summary'
          file_pattern: dag/*.json
