<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Kvitrehus</title>
    <style>
        body { background:#222; color:white; text-align:center; font-family:sans-serif; }
        img { max-width:100%; border:2px solid #444; margin-top:20px; }
        button { background:#4CAF50; color:white; padding:10px 20px; 
                 border:none; border-radius:5px; cursor:pointer; font-size:16px; margin-top:20px; }
        button:hover { background:#45a049; }
        #status { color:#aaa; margin-top:10px; }
    </style>
</head>
<body>
    <h1>🐦 Kvitrehus</h1>
    <h2 id="timestamp">Laster...</h2>
    <img id="bilde" src="" alt="Fuglehus">
    <br>
    <button onclick="taBilde()">📷 Ta bilde nå</button>
    <p id="status"></p>

    <script>
        async function hentSisteBilde() {
            const resp = await fetch('https://api.github.com/repos/torbjornsand/fuglehus/contents/');
            const files = await resp.json();
            const bilder = files
                .filter(f => f.name.startsWith('bilde_') && f.name.endsWith('.jpg'))
                .sort((a, b) => b.name.localeCompare(a.name));
            
            if (bilder.length > 0) {
                const siste = bilder[0];
                document.getElementById('bilde').src = siste.download_url;
                document.getElementById('timestamp').textContent = siste.name.replace('bilde_', '').replace('.jpg', '').replace(/_/g, ' ');
            }
        }

        async function taBilde() {
            document.getElementById('status').textContent = '📷 Tar bilde...';
            try {
                const resp = await fetch('https://fuglehus.torbjs.workers.dev', {
                    method: 'POST'
                });
                const data = await resp.json();
                if (data.success) {
                    document.getElementById('status').textContent = '✅ Bilde tatt! Oppdaterer om 30 sek...';
                    setTimeout(hentSisteBilde, 30000);
                } else {
                    document.getElementById('status').textContent = '❌ Feil: ' + data.error;
                }
            } catch (e) {
                document.getElementById('status').textContent = '❌ Kunne ikke nå Pi.';
            }
        }

        hentSisteBilde();
        setInterval(hentSisteBilde, 600000);
    </script>
</body>
</html>
